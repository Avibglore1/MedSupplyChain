name: MSCB CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Backend install + test
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Run Backend Tests
        run: |
          cd backend
          npm test

      # Frontend install
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      # Lint frontend
      - name: Run Lint
        run: |
          cd frontend
          npm run lint || true

      # Docker build
      - name: Build Docker Images
        run: |
          docker build -t mscb-backend ./backend
          docker build -t mscb-frontend ./frontend

      # (Optional) Push to DockerHub
      # - name: Login DockerHub
      #   run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # - name: Push Images
      #   run: |
      #     docker tag mscb-backend yourusername/mscb-backend
      #     docker push yourusername/mscb-backend